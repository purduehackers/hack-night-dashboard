---
- name: Set up Hack Night Dashboard on Mac Mini (Ubuntu)
  hosts: mac-mini
  become: true

  vars:
      tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"

  tasks:
      # ── System basics ──────────────────────────────────────────────
      - name: Upgrade all packages
        ansible.builtin.apt:
            upgrade: dist
            update_cache: true
            cache_valid_time: 3600

      - name: Install common packages
        ansible.builtin.apt:
            name:
                - curl
                - git
                - build-essential
                - htop
                - ufw
                - unzip
            state: present

      # ── Firewall ───────────────────────────────────────────────────
      - name: Allow SSH through UFW
        community.general.ufw:
            rule: allow
            name: OpenSSH

      - name: Enable UFW
        community.general.ufw:
            state: enabled

      # ── Tailscale ──────────────────────────────────────────────────
      - name: Add Tailscale GPG key
        ansible.builtin.shell: |
            curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg \
              | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
        args:
            creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

      - name: Add Tailscale apt repository
        ansible.builtin.apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu noble main"
            filename: tailscale
            state: present

      - name: Install Tailscale
        ansible.builtin.apt:
            name: tailscale
            state: present
            update_cache: true

      - name: Enable and start Tailscale service
        ansible.builtin.systemd:
            name: tailscaled
            enabled: true
            state: started

      - name: Authenticate Tailscale to tailnet
        ansible.builtin.command: tailscale up --authkey={{ tailscale_authkey }}
        when: tailscale_authkey | length > 0
        changed_when: false
